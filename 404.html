<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>404 — Aaryan Gupta</title>
  <meta name="robots" content="noindex">
  <script>(function(){var t=localStorage.getItem('portfolio-theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="/assets/css/dark.css">
  <link rel="stylesheet" href="/assets/css/light.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-void,#030D0A);color:var(--text-primary,#C2E8D8);font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .num{font-size:clamp(6rem,20vw,10rem);font-weight:800;background:linear-gradient(135deg,#00C896,#00D4E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    h1{font-size:1.5rem;color:#E8FAF4;margin:.75rem 0}
    p{color:#7AAA98;max-width:40ch;margin:.5rem auto 2rem;line-height:1.7}
    a{display:inline-block;padding:.75rem 2rem;background:#00C896;color:#030D0A;font-weight:700;text-decoration:none;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
  </style>
</head>
<body>
  <div>
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
